<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | RemixQQ</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Noto Sans SC", sans-serif;
      background: linear-gradient(160deg, #fff8fb, #f0f4ff);
      color: #3d3654;
      text-align: center;
      padding: 24px;
    }
    .box {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,107,157,0.14);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 8px 32px rgba(139,140,247,0.12);
      max-width: 420px;
    }
    h1 {
      font-family: "ZCOOL KuaiLe", sans-serif;
      font-size: 4rem;
      background: linear-gradient(135deg, #ff6b9d, #8b8cf7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p { margin: 16px 0 28px; color: #8b83a8; }
    a {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff6b9d, #ff8fb8);
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:3rem;margin-bottom:8px;">(´；ω；`)</div>
    <h1>404</h1>
    <p>页面走丢了…也许它在蘑菇森林里迷路了</p>
    <a href="/">回到小窝 ~</a>
  </div>
</body>
</html>
